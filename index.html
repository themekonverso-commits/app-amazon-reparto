<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📦 Rutas Amazon</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0b1120; color: #e2e8f0; font-family: -apple-system, system-ui, sans-serif; min-height: 100vh; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    button { font-family: inherit; cursor: pointer; }
    a { color: inherit; }

    .card  { background: #1a2540; border: 1px solid #253354; border-radius: 14px; padding: 14px 16px; }
    .card-green { background: #16a34a; border: 1px solid #16a34a; border-radius: 20px; padding: 20px; }
    .card-amber { background: #2d1f07; border: 1px solid #d97706; border-radius: 14px; padding: 12px 16px; }

    .btn-green { background:#16a34a; color:#fff; border:none; border-radius:14px; padding:16px; font-size:17px; font-weight:700; width:100%; }
    .btn-ghost { background:transparent; border:1px solid #253354; border-radius:12px; padding:12px; font-size:14px; color:#64748b; width:100%; }
    .btn-route { background:#1a2540; border:1px solid #253354; border-radius:14px; padding:16px 8px; font-size:16px; font-weight:700; color:#f8fafc; text-align:center; }
    .btn-nav   { flex:1; background:#131c2e; border:1px solid #253354; border-radius:12px; padding:14px; font-size:22px; color:#e2e8f0; }
    .btn-nav:disabled { color:#253354; cursor:default; }

    .label { font-size:11px; color:#64748b; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
    .progress-bar { height:4px; background:#253354; border-radius:4px; margin:0 16px; }
    .progress-fill { height:100%; background:#22c55e; border-radius:4px; transition:width .3s; }
    .progress-text { text-align:center; font-size:12px; color:#64748b; margin:5px 0 2px; }

    .list-item { display:flex; align-items:flex-start; gap:14px; padding:14px 16px; border-bottom:1px solid #253354; cursor:pointer; }
    .badge { min-width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:#fff; flex-shrink:0; }

    .drop-zone { width:100%; border:2px dashed #253354; border-radius:20px; padding:44px 24px; text-align:center; cursor:pointer; background:#131c2e; }
  </style>
</head>
<body>
<div id="app"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let wb = null, sheetNames = [], stops = [], routeName = "", curIdx = 0, doneSet = new Set(), view = "upload";

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtWindow(s) { return String(s||"").replace(/(\d{2}:\d{2}):\d{2}/g,"$1").trim(); }
function fmtRoute(n)  { return n.replace("sequencedRoute_","").replace(/_/g,"-"); }
function esc(s)       { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function mapsUrl(s)   { return s.lat&&s.lng ? `https://maps.google.com/?q=${s.lat},${s.lng}` : `https://maps.google.com/?q=${encodeURIComponent(s.address)}`; }

function parseSheet(ws) {
  const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
  const out = [];
  for (let i = 2; i < raw.length; i++) {
    const r = raw[i]; if (!r||!r[0]) continue;
    const num = Number(r[0]); if (isNaN(num)||num<=0) continue;
    out.push({
      stop: num, trackingId: String(r[1]||""),
      timeWindow: fmtWindow(r[4]), address: String(r[5]||""),
      postal: String(r[6]||""),
      notes: String(r[8]||"").replace(/NaN/gi,"").trim(),
      lat: r[9]||"", lng: r[10]||"",
    });
  }
  return out.sort((a,b) => a.stop - b.stop);
}

// ── File handling ─────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    wb = XLSX.read(new Uint8Array(e.target.result), { type:"array" });
    sheetNames = wb.SheetNames;
    stops=[]; doneSet=new Set(); view="select";
    render();
  };
  reader.readAsArrayBuffer(file);
}

// ── Actions (global so onclick= works) ────────────────────────────────────
window.pickFile    = ()    => document.getElementById("fi").click();
window.onFC        = el    => handleFile(el.files[0]);
window.onDrop      = e     => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
window.onDragOver  = e     => e.preventDefault();

window.loadRoute   = name  => { stops=parseSheet(wb.Sheets[name]); routeName=name; curIdx=0; doneSet=new Set(); view="navigate"; render(); };
window.setView     = v     => { view=v; render(); };
window.goTo        = i     => { curIdx=i; view="navigate"; render(); };

window.markDone    = ()    => { doneSet.add(curIdx); if(curIdx<stops.length-1) curIdx++; render(); };
window.unmarkDone  = ()    => { doneSet.delete(curIdx); render(); };
window.prev        = ()    => { if(curIdx>0){ curIdx--; render(); } };
window.next        = ()    => { if(curIdx<stops.length-1){ curIdx++; render(); } };

// ── Render ────────────────────────────────────────────────────────────────
function render() { document.getElementById("app").innerHTML = views[view](); }

const views = {

  upload: () => `
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:24px">
      <div style="text-align:center">
        <div style="font-size:60px;margin-bottom:8px">📦</div>
        <h1 style="font-size:26px;font-weight:800;color:#f8fafc">Navegador de Rutas</h1>
        <p style="margin-top:8px;color:#64748b;font-size:14px">Sube el archivo XLS diario de Amazon</p>
      </div>
      <div class="drop-zone" onclick="pickFile()" ondrop="onDrop(event)" ondragover="onDragOver(event)">
        <div style="font-size:40px;margin-bottom:12px">📁</div>
        <p style="font-weight:700;font-size:17px">Seleccionar archivo .xls</p>
        <p style="margin-top:6px;font-size:13px;color:#64748b">o arrastra y suelta aquí</p>
      </div>
      <input id="fi" type="file" accept=".xls,.xlsx" style="display:none" onchange="onFC(this)">
    </div>`,

  select: () => `
    <div style="flex:1;display:flex;flex-direction:column">
      <div style="padding:20px 20px 12px;border-bottom:1px solid #253354">
        <h2 style="font-size:20px;font-weight:800;color:#f8fafc">Selecciona tu ruta</h2>
        <p style="margin-top:4px;font-size:13px;color:#64748b">${sheetNames.length} rutas disponibles hoy</p>
      </div>
      <div style="flex:1;overflow-y:auto;padding:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;align-content:start">
        ${sheetNames.map(n=>`<button class="btn-route" onclick="loadRoute('${esc(n)}')">${esc(fmtRoute(n).replace("XB-",""))}</button>`).join("")}
      </div>
      <div style="padding:16px"><button class="btn-ghost" onclick="setView('upload')">← Cambiar archivo</button></div>
    </div>`,

  navigate: () => {
    const cur = stops[curIdx], total = stops.length;
    const doneCount = doneSet.size, pct = total>0?(doneCount/total*100):0;
    const isDone = doneSet.has(curIdx), remaining = total - doneCount;
    if (!cur) return `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:#64748b">Sin paradas</div>`;
    return `
      <div style="flex:1;display:flex;flex-direction:column">
        <!-- topbar -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px">
          <button onclick="setView('select')" style="background:transparent;border:none;color:#64748b;font-size:13px">← ${esc(fmtRoute(routeName))}</button>
          <button onclick="setView('list')" style="background:#131c2e;border:1px solid #253354;border-radius:8px;padding:6px 14px;color:#e2e8f0;font-size:13px;font-weight:600">Lista ☰</button>
        </div>
        <!-- progress -->
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${remaining>0?`${doneCount} entregados · ${remaining} pendientes`:"✅ ¡Ruta completada!"}</div>
        <!-- content -->
        <div style="flex:1;display:flex;flex-direction:column;padding:10px 16px 20px;gap:12px;overflow-y:auto">
          <!-- address -->
          <div style="background:${isDone?"#16a34a":"#1a2540"};border:1px solid ${isDone?"#16a34a":"#253354"};border-radius:20px;padding:20px">
            <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:14px">
              <span style="font-size:44px;font-weight:900;color:#f8fafc;line-height:1">#${cur.stop}</span>
              <span style="font-size:14px;color:${isDone?"#d1fae5":"#64748b"}">de ${total}</span>
              ${isDone?`<span style="margin-left:auto;font-size:28px">✅</span>`:""}
            </div>
            <div style="font-size:19px;font-weight:700;color:#f8fafc;line-height:1.35;margin-bottom:6px">${esc(cur.address)}</div>
            ${cur.postal?`<div style="font-size:13px;color:${isDone?"#d1fae5":"#64748b"}">CP ${esc(cur.postal)}</div>`:""}
          </div>
          <!-- tracking -->
          <div class="card">
            <div class="label">Tracking ID</div>
            <div style="font-size:19px;font-weight:800;color:#3b82f6;font-family:monospace;letter-spacing:.04em">${esc(cur.trackingId)||"—"}</div>
          </div>
          ${cur.timeWindow?`<div class="card" style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">🕐</span><div><div class="label">Horario de entrega</div><div style="font-size:16px;font-weight:700;color:#f8fafc">${esc(cur.timeWindow)}</div></div></div>`:""}
          ${cur.notes?`<div class="card-amber" style="display:flex;gap:10px"><span style="font-size:18px">⚠️</span><div><div style="font-size:11px;color:#d97706;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px">Nota del cliente</div><div style="font-size:14px;color:#fde68a">${esc(cur.notes)}</div></div></div>`:""}
          <!-- maps -->
          <a href="${mapsUrl(cur)}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:8px;background:#131c2e;border:1px solid #253354;border-radius:14px;padding:14px;color:#f8fafc;text-decoration:none;font-weight:700;font-size:15px">🗺️ Abrir en Google Maps</a>
          <div style="flex:1"></div>
          ${isDone
            ? `<button class="btn-ghost" onclick="unmarkDone()" style="padding:16px;font-size:17px;font-weight:700">↩ Desmarcar</button>`
            : `<button class="btn-green" onclick="markDone()">✓ Entregado</button>`}
          <!-- prev/next -->
          <div style="display:flex;gap:10px">
            <button class="btn-nav" onclick="prev()" ${curIdx===0?"disabled":""}>◀</button>
            <div style="flex:2;background:#131c2e;border:1px solid #253354;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#64748b;font-weight:600">${curIdx+1} / ${total}</div>
            <button class="btn-nav" onclick="next()" ${curIdx===total-1?"disabled":""}>▶</button>
          </div>
        </div>
      </div>`;
  },

  list: () => {
    const total = stops.length, doneCount = doneSet.size, pct = total>0?(doneCount/total*100):0;
    const items = stops.map((s,i) => {
      const isDoneItem = doneSet.has(i), isCur = i===curIdx;
      const badgeBg = isDoneItem?"#16a34a":isCur?"#3b82f6":"#253354";
      return `<div class="list-item" onclick="goTo(${i})" style="background:${isCur?"#1a2540":"transparent"};opacity:${isDoneItem?.4:1}">
        <div class="badge" style="background:${badgeBg}">${isDoneItem?"✓":s.stop}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;color:#f8fafc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.address.split(",").slice(0,2).join(","))}</div>
          <div style="font-size:12px;color:#64748b;margin-top:2px">${esc(s.trackingId)} · ${esc(s.timeWindow)}</div>
        </div>
      </div>`;
    }).join("");
    return `
      <div style="flex:1;display:flex;flex-direction:column">
        <div style="padding:16px 16px 12px;border-bottom:1px solid #253354;display:flex;align-items:center;gap:12px">
          <button onclick="setView('navigate')" style="background:transparent;border:none;color:#3b82f6;font-size:24px">←</button>
          <div>
            <div style="font-weight:800;font-size:17px;color:#f8fafc">${esc(fmtRoute(routeName))}</div>
            <div style="font-size:12px;color:#64748b">${doneCount}/${total} entregados</div>
          </div>
        </div>
        <div class="progress-bar" style="margin:0"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div style="flex:1;overflow-y:auto">${items}</div>
      </div>`;
  }
};

render();
</script>
</body>
</html>
